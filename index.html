<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Automation Sign-Up</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: rgba(19, 28, 53, 0.86);
        --text: #f5f7ff;
        --muted: #b8c1e0;
        --accent: #6ee7ff;
        --accent-2: #7c3aed;
        --border: rgba(184, 193, 224, 0.2);
        --success: #28c76f;
        --error: #ff5d73;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, rgba(124, 58, 237, 0.35), transparent 40%),
          radial-gradient(circle at 85% 10%, rgba(110, 231, 255, 0.25), transparent 40%),
          linear-gradient(140deg, #060a17, var(--bg));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(440px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-size: 0.88rem;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(7, 12, 27, 0.75);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(110, 231, 255, 0.2);
      }

      button {
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(95deg, var(--accent-2), #4f46e5, #0ea5e9);
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.2s;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .message {
        margin-top: 14px;
        min-height: 24px;
        font-size: 0.92rem;
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Starte dein AI Automation Onboarding</h1>
      <p>Trag dich ein und wir melden uns schnellstmöglich bei dir.</p>

      <form id="signupForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="z. B. Sarah Johnson" required />
        </div>

        <div>
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" placeholder="z. B. sarah@firma.de" required />
        </div>

        <div>
          <label for="phone">Telefonnummer</label>
          <input id="phone" name="phone" type="tel" placeholder="z. B. +49 151 1234567" required />
        </div>

        <button type="submit" id="submitBtn">Sign Up</button>
      </form>

      <div id="message" class="message" aria-live="polite"></div>
    </section>

    <script>
      const webhookUrl = "https://ki-test.app.n8n.cloud/webhook-test/customer-onboarding-start";

      const form = document.getElementById("signupForm");
      const submitBtn = document.getElementById("submitBtn");
      const messageEl = document.getElementById("message");

      function setMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message" + (type ? " " + type : "");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setMessage("", "");
        submitBtn.disabled = true;
        submitBtn.textContent = "Wird gesendet...";

        const payload = {
          customerName: form.name.value.trim(),
          email: form.email.value.trim(),
          phone: form.phone.value.trim(),
          package: "Premium",
          signupDate: new Date().toISOString().slice(0, 10),
          source: "website"
        };

        try {
          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Webhook antwortet mit Status " + response.status);
          }

          form.reset();
          setMessage("Danke! Deine Anmeldung wurde erfolgreich übermittelt.", "success");
        } catch (error) {
          setMessage("Fehler beim Senden. Bitte später erneut versuchen.", "error");
          console.error(error);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign Up";
        }
      });
    </script>
  </body>
</html>
